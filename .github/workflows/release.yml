name: Release

# Build, package, checksum, and publish release binaries when a version tag is
# pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`). Each target uploads
# a `.tar.gz` archive plus a matching `.sha256` so linux-ops-install can verify
# the download before installing it.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # The in-workspace suite tools — the ones linux-ops-install pulls from THIS
      # repo's release. Keep this list in sync with
      # crates/linux-ops-install/src/release.rs (the TOOLS registry) and the
      # README "Supported binaries" list.
      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: >
          cargo build --release --locked --target ${{ matrix.target }}
          -p toolbox-bridge -p rex-doctor -p portman -p pulse
          -p tripwire -p rewind -p conductor -p rex-forge

      - name: Build (cross)
        if: matrix.cross
        run: >
          cross build --release --locked --target ${{ matrix.target }}
          -p toolbox-bridge -p rex-doctor -p portman -p pulse
          -p tripwire -p rewind -p conductor -p rex-forge

      - name: Package archive + checksum
        id: package
        run: |
          set -euo pipefail
          asset="linux-ops-suite-${{ matrix.target }}"
          bindir="target/${{ matrix.target }}/release"
          bins="toolbox-bridge rex-doctor portman pulse tripwire rewind conductor rex-forge"
          staging="$(mktemp -d)"
          for bin in $bins; do
            test -f "$bindir/$bin" || { echo "missing binary: $bindir/$bin"; ls -la "$bindir"; exit 1; }
            install -m 0755 "$bindir/$bin" "$staging/$bin"
          done
          # One umbrella archive holding every in-workspace tool binary; the
          # installer extracts each one by name (find_binary).
          tar -czf "$asset.tar.gz" -C "$staging" $bins
          sha256sum "$asset.tar.gz" > "$asset.tar.gz.sha256"
          echo "archive=$asset.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=$asset.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
