name: CI

# Run on every push to main and on PRs targeting main.
# This repo holds the Rust workspace (the shared `suite-ui` crate and the
# `toolbox-bridge` tool) and the JSON contract/schema files, so CI verifies
# the workspace (build + clippy + tests) AND validates the JSON contracts.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust workspace (suite-ui + toolbox-bridge)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Cache the cargo registry and target dir keyed on Cargo.lock, so most
      # runs reuse compiled dependencies instead of rebuilding from scratch.
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Hard formatting gate: any rustfmt drift fails the job before lint/build.
      - name: Check formatting
        run: cargo fmt --check

      # Lint with all features and all targets (examples included), warnings as
      # errors. `--all-features` covers the `clap` feature ScriptVault relies on.
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # Explicit build step: a compile failure surfaces here with a clear label
      # before tests run. Builds the gallery example too via --all-targets.
      - name: Build
        run: cargo build --workspace --all-targets --all-features

      - name: Run tests
        run: cargo test --workspace --all-features

  json:
    name: Validate JSON contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install check-jsonschema
        run: pipx install 'check-jsonschema==0.29.4'

      # 1. Every tracked .json file must be well-formed JSON. `python -m json.tool`
      #    parses each file and fails the step on the first syntax error.
      - name: Check all JSON files parse
        run: |
          set -euo pipefail
          git ls-files '*.json' | while read -r f; do
            echo "parsing $f"
            python3 -m json.tool "$f" > /dev/null
          done

      # 2. Every schema file (contracts/*.schema.json) must itself be a valid
      #    JSON Schema. --check-metaschema validates the schema against the
      #    JSON Schema metaschema, catching malformed schema definitions.
      - name: Validate schema files against JSON Schema metaschema
        run: check-jsonschema --check-metaschema contracts/*.schema.json

      # 3. Every example payload must conform to its schema. This is what keeps
      #    the examples honest: if a producer drifts an example or a schema
      #    tightens away from it, this step fails. Pairs are listed explicitly
      #    (example -> schema); add a line here when a provisional schema gains
      #    an example.
      - name: Validate examples against their schemas
        run: |
          set -euo pipefail
          validate() {
            echo "validating examples/$1 against contracts/$2"
            check-jsonschema --schemafile "contracts/$2" "examples/$1"
          }
          validate bulwark.scan.example.json                   bulwark.scan.schema.json
          validate bulwark.workstate-feed.v1.example.json      bulwark.workstate-feed.v1.schema.json
          validate proto.session.example.json                  proto.session.schema.json
          validate proto.workstate-feed.v1.example.json        proto.workstate-feed.v1.schema.json
          validate rexops.snapshot.example.json                rexops.snapshot.schema.json
          validate scriptvault.export.example.json             scriptvault.export.schema.json
          validate toolbox-bridge.workstate-feed.v1.example.json toolbox-bridge.workstate-feed.v1.schema.json
          validate toolfoundry.workstate-feed.v1.example.json  toolfoundry.workstate-feed.v1.schema.json
          validate workstate.snapshot.example.json             workstate.snapshot.schema.json
