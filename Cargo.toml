[workspace]
resolver = "2"
members = [
    "crates/suite-ui",
    "crates/thomas-tui",
    "crates/toolbox-bridge",
    "crates/linux-ops-install",
    "crates/rex-check",
    "crates/rex-doctor",
    "crates/portman",
    "crates/pulse",
    "crates/tripwire",
]

[workspace.package]
version = "0.1.2"
edition = "2021"
rust-version = "1.85"
authors = ["tomb"]
license = "MIT"
repository = "https://github.com/tom2025b/linux-ops-suite"

[workspace.dependencies]
ratatui = "0.29"
crossterm = "0.28"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
