[workspace]
resolver = "2"
members = [
    "crates/suite-core",
    "crates/suite-ui",
    "crates/thomas-tui",
    "crates/toolbox-bridge",
    "crates/linux-ops-install",
    "crates/rex-check",
    "crates/rex-doctor",
    "crates/portman",
    "crates/pulse",
    "crates/tripwire",
    "crates/rewind",
    "crates/conductor",
    "crates/rex-forge",
]

[workspace.package]
version = "0.2.0"
edition = "2021"
rust-version = "1.85"
authors = ["tomb"]
license = "MIT"
repository = "https://github.com/tom2025b/linux-ops-suite"

[workspace.dependencies]
suite-core = { path = "crates/suite-core" }
suite-ui = { path = "crates/suite-ui" }
ratatui = "0.29"
crossterm = "0.28"
unicode-width = "0.2"
unicode-segmentation = "1"
insta = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
minijinja = "2"
include_dir = "0.7"
toml = "0.8"
tempfile = "3"
